<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow Lite Pro</title>

  <link rel="stylesheet" href="styles/main.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="container">

  <!-- Header -->
  <header>
    <h1>
      <i class="fa-solid fa-list-check"></i>
      TaskFlow Lite Pro
    </h1>

    <button id="themeBtn" class="theme-btn">
      <i class="fa-solid fa-moon"></i>
    </button>
  </header>

  <!-- Stats -->
  <div class="stats">

    <div class="card">
      <h2 id="totalTasks">0</h2>
      <p>Total Tasks</p>
    </div>

    <div class="card">
      <h2 id="completedTasks">0</h2>
      <p>Completed</p>
    </div>

    <div class="card">
      <h2 id="pendingTasks">0</h2>
      <p>Pending</p>
    </div>

  </div>

  <!-- Add Task -->
  <form id="taskForm">

    <div class="input-group">
      <input
        type="text"
        id="taskInput"
        placeholder="Enter a task..."
        maxlength="100"
      >

      <button type="submit" id="addBtn">
        <i class="fa-solid fa-plus"></i>
      </button>
    </div>

    <small id="errorMessage"></small>

  </form>

  <!-- Search -->
  <div class="search-box">

    <i class="fa-solid fa-magnifying-glass"></i>

    <input
      type="text"
      id="searchInput"
      placeholder="Search tasks..."
    >

  </div>

  <!-- Filters -->
  <div class="filters">

    <button class="filter-btn active" data-filter="all">
      All
    </button>

    <button class="filter-btn" data-filter="active">
      Active
    </button>

    <button class="filter-btn" data-filter="completed">
      Completed
    </button>

  </div>

  <!-- Task List -->
  <ul id="taskList">

    <!-- Dynamic Tasks -->

  </ul>

  <!-- Empty State -->
  <div id="emptyState" class="empty-state">

    <i class="fa-solid fa-clipboard-list"></i>

    <h3>No Tasks Yet</h3>

    <p>Add your first task and start being productive.</p>

  </div>

  <!-- Footer -->
  <footer>

    <p>
      Built with HTML, CSS & JavaScript
    </p>

  </footer>

</div>

<script src="app.js"></script>

</body>
</html>
